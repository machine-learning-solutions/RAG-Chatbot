services:
  # Public UI (Streamlit)
  - type: web
    name: rag-frontend
    env: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: starter
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: BACKEND_URL
        value: http://rag-backend:8000

  # Private FastAPI backend (only reachable inside Render private network)
  - type: pserv
    name: rag-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    autoDeploy: true
    disk:
      name: rag-backend-data
      mountPath: /app/data
      sizeGB: 10
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rag-postgres
          property: connectionString
      - key: OLLAMA_BASE_URL
        value: http://rag-ollama:11434
      - key: OLLAMA_MODEL
        value: gemma4:e2b
      - key: EMBEDDING_MODEL
        value: intfloat/multilingual-e5-large
      - key: LLM_TEMPERATURE
        value: "0"
      - key: VECTOR_STORE_PATH
        value: /app/data/vector_store
      - key: UPLOAD_DIR
        value: /app/data/uploads
      - key: TURBOVEC_BIT_WIDTH
        value: "4"
      - key: RERANKER_ENABLED
        value: "true"
      - key: HYBRID_SEARCH_ENABLED
        value: "true"
      - key: TOP_K
        value: "8"
      - key: RETRIEVAL_MIN_K
        value: "8"

  # Private Ollama service
  - type: pserv
    name: rag-ollama
    env: docker
    dockerfilePath: ./ollama/Dockerfile
    dockerContext: ./ollama
    plan: starter
    autoDeploy: true
    disk:
      name: rag-ollama-data
      mountPath: /root/.ollama
      sizeGB: 25
    envVars:
      - key: OLLAMA_MODEL
        value: gemma4:e2b

databases:
  - name: rag-postgres
    plan: starter


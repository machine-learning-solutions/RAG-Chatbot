services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag_secret
      POSTGRES_DB: ragdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d ragdb"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama pull llama3.2 || ollama pull llama3.2:3b || true
        echo "Ollama model pull complete"
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://rag:rag_secret@postgres:5432/ragdb
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: llama3.2
      EMBEDDING_MODEL: intfloat/multilingual-e5-large
      LLM_TEMPERATURE: "0"
      VECTOR_STORE_PATH: /app/data/vector_store
      UPLOAD_DIR: /app/data/uploads
      CHUNK_SIZE: "512"
      CHUNK_OVERLAP: "64"
      TURBOVEC_BIT_WIDTH: "4"
      RERANKER_ENABLED: "true"
      RERANKER_MODEL: cross-encoder/mmarco-mMiniLMv2-L12-H384-v1
      HYBRID_SEARCH_ENABLED: "true"
      TOP_K: "8"
      RETRIEVAL_MIN_K: "8"
    volumes:
      - backend_data:/app/data
      - embedding_cache:/root/.cache/huggingface
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "8501:8501"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  ollama_data:
  backend_data:
  embedding_cache:

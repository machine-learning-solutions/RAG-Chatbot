services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag_secret
      POSTGRES_DB: ragdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d ragdb"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ollama:
    # Pin below 0.30: latest CUDA backend breaks on driver 535 (RTX 4060/3050).
    image: ollama/ollama:0.24.0
    gpus: all
    environment:
      OLLAMA_KEEP_ALIVE: "-1"
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: all
      # Unset ROCm hint so NVIDIA GPU discovery works in Docker (ollama/ollama#11852).
      ROCR_VISIBLE_DEVICES: ""
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama:0.24.0
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama pull gemma4:e2b || ollama pull gemma4:e4b || true
        # Pre-load weights so the first visitor request stays under proxy timeouts.
        printf 'warmup' | ollama run gemma4:e2b --think=false >/dev/null 2>&1 || true
        echo "Ollama model pull and warmup complete"
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # Embeddings on CPU — Ollama uses ~7 GB VRAM; both won't fit on 8 GB GPUs.
    environment:
      TORCH_DEVICE: cpu
      DATABASE_URL: postgresql+asyncpg://rag:rag_secret@postgres:5432/ragdb
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: gemma4:e2b
      EMBEDDING_MODEL: intfloat/multilingual-e5-large
      LLM_TEMPERATURE: "0"
      VECTOR_STORE_PATH: /app/data/vector_store
      UPLOAD_DIR: /app/data/uploads
      CHUNK_SIZE: "512"
      CHUNK_OVERLAP: "64"
      TURBOVEC_BIT_WIDTH: "4"
      RERANKER_ENABLED: "false"
      RERANKER_MODEL: cross-encoder/mmarco-mMiniLMv2-L12-H384-v1
      HYBRID_SEARCH_ENABLED: "true"
      TOP_K: "3"
      RETRIEVAL_MIN_K: "3"
      # Polish doubles LLM latency; keep off for portfolio proxy (60s limit).
      ARABIC_POLISH_ENABLED: "false"
      MAX_CONTEXT_CHUNKS: "3"
      CONTEXT_CHUNK_MAX_CHARS: "1500"
      LLM_NUM_PREDICT: "320"
    volumes:
      - backend_data:/app/data
      - embedding_cache:/root/.cache/huggingface
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "8501:8501"
    depends_on:
      - backend
    restart: unless-stopped

  # Single entry for ngrok: /api → backend, everything else → Streamlit.
  gateway:
    image: nginx:1.27-alpine
    volumes:
      - ./deploy/ngrok/gateway.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "9080:9080"
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
  ollama_data:
  backend_data:
  embedding_cache:

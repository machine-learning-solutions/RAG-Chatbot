# Optional: prevent idle/lid suspend while this machine acts as the chatbot host.
# Install: sudo cp deploy/systemd/99-chatbot-no-suspend.conf /etc/systemd/logind.d/
#          sudo systemctl restart systemd-logind
#
# Note: closing the lid may still suspend on some laptops unless external power + BIOS
# allows it. For true 24/7 uptime, use a VPS or Render (see render.yaml).

[Login]
HandleLidSwitch=ignore
HandleLidSwitchExternalPower=ignore
IdleAction=ignore

# jehadabuawwad.com — reverse proxy to ngrok WITH skip header
# Install on the server that hosts jehadabuawwad.com (NOT the Chatbot Docker host).
#
# 1. Copy to nginx: /etc/nginx/sites-available/jehadabuawwad-chat.conf
# 2. sudo ln -s .../jehadabuawwad-chat.conf /etc/nginx/sites-enabled/
# 3. sudo nginx -t && sudo systemctl reload nginx
# 4. Change portfolio iframe src (see embed-snippet.html)

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 443 ssl http2;
    server_name jehadabuawwad.com www.jehadabuawwad.com;

    # ssl_certificate ... (your existing cert paths)

    # Proxy chatbot — browser stays on jehadabuawwad.com, nginx talks to ngrok with skip header
    location /chat/ {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host curable-steerable-obnoxious.ngrok-free.dev;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;

        # REQUIRED — without these, iPhone shows ngrok "Visit Site" page forever in iframe
        proxy_set_header ngrok-skip-browser-warning "1";
        proxy_set_header User-Agent "PortfolioChat/1.0";

        proxy_pass https://curable-steerable-obnoxious.ngrok-free.dev/;
    }

    # ... your existing portfolio location / { ... }
}
